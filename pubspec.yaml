name: blame_the_director
description: "Blame the Director — a movie review app where every bad film is obviously the director's fault."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  dio: ^5.8.0+1
  cached_network_image: ^3.4.1
  go_router: ^16.0.0
  pretty_dio_logger: ^1.4.0
  get_it: ^8.0.3
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env